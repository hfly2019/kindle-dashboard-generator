name: Generate Kindle Dashboard

on:
  schedule:
    # 定时任务：每 30 分钟执行一次 (使用 UTC 时间)
    - cron: '*/30 * * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上点击按钮手动运行测试

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限，机器人才能把图片提交到代码库

    steps:
      - name: 拉取代码
        uses: actions/checkout@v3

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 安装 Puppeteer 依赖
        run: npm install

      - name: 执行截图脚本
        run: node screenshot.js

      - name: 提交并推送图片到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dashboard.png
          # 如果图片没有变化（比如时间没变），忽略报错继续执行
          git commit -m "自动更新 Kindle 看板图片" || exit 0
          git push
